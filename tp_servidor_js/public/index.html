<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Operaciones con Matrices</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="container">
        <header>
            <h1>Operaciones con Matrices</h1>
            <p>Usa la interfaz para ingresar dos matrices y realizar suma o producto mediante el servidor.</p>
        </header>

        <section class="matrices">
            <article class="matrix-panel">
                <h2>Matriz A</h2>
                <div class="matrix-config">
                    <label>
                        Filas
                        <select id="filasA"></select>
                    </label>
                    <label>
                        Columnas
                        <select id="columnasA"></select>
                    </label>
                    <button id="generarA" class="secondary">Generar A</button>
                </div>
                <div id="matrizA" class="matrix-grid"></div>
            </article>

            <article class="matrix-panel">
                <h2>Matriz B</h2>
                <div class="matrix-config">
                    <label>
                        Filas
                        <select id="filasB"></select>
                    </label>
                    <label>
                        Columnas
                        <select id="columnasB"></select>
                    </label>
                    <button id="generarB" class="secondary">Generar B</button>
                </div>
                <div id="matrizB" class="matrix-grid"></div>
            </article>
        </section>

        <section class="operaciones">
            <h2>Operaciones</h2>
            <div class="buttons-row">
                <button id="sumar">Sumar</button>
                <button id="multiplicar">Multiplicar</button>
            </div>
            <p class="info-text">Para sumar, ambas matrices deben tener las mismas dimensiones. Para multiplicar, las columnas de A deben coincidir con las filas de B.</p>
        </section>

        <section class="resultado">
            <h2>Resultado</h2>
            <div id="mensaje" class="mensaje"></div>
            <div id="resultado" class="resultado-grid"></div>
            <pre id="jsonResponse" class="json-response"></pre>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
